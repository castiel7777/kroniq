<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiflisi 1898 - Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Roboto+Condensed:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0b0b;
            --card-bg: #111111;
            --text: #d4c4a8;
            --text-dim: #9a8b75;
            --red: #6e1a1a;
            --red-h: #8a2020;
            --border: #332d22;
            --border-h: #554c38;
            --gold: #e6d8b8;
            --font-h: 'Rye', serif;
            --font-b: 'Roboto Condensed', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: var(--text);
            font-family: var(--font-b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, .85);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo h1 {
            font-family: var(--font-h);
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .logo span {
            font-size: .7rem;
            color: var(--red);
            letter-spacing: 1px;
            display: block;
            margin-top: 2px;
        }

        .main-nav {
            display: flex;
            gap: 30px;
        }

        .main-nav a {
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: color .3s;
        }

        .main-nav a:hover,
        .main-nav a.active {
            color: var(--red);
        }

        .main-nav a.active {
            border-bottom: 2px solid var(--red);
            padding-bottom: 5px;
        }

        .cart-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 15px;
            font-family: var(--font-b);
            font-weight: 700;
            cursor: pointer;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color .3s, color .3s;
        }

        .cart-btn:hover {
            border-color: var(--red);
            color: var(--gold);
        }

        .cart-count {
            background: var(--red);
            color: #fff;
            padding: 2px 7px;
            border-radius: 50%;
            font-size: .8rem;
            min-width: 22px;
            text-align: center;
            transition: transform .2s;
        }

        .cart-count.bump {
            transform: scale(1.4);
        }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, .4), rgba(0, 0, 0, .8)),
                url('https://res.cloudinary.com/dlp1pnarv/image/upload/v1777743373/my-current-desktop-wallpaper-red-dead-redemption-2-v0-smqu1rp7hsnf1_jzmy5b.webp') center/cover no-repeat;
            height: 350px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            border-bottom: 2px solid var(--border);
        }

        .hero-content h2 {
            font-family: var(--font-h);
            font-size: 5rem;
            letter-spacing: 5px;
            color: #f4ebd8;
            text-shadow: 2px 2px 6px #000;
            margin-bottom: 10px;
        }

        .hero-content p {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px #000;
        }

        .browse-btn {
            background: var(--red);
            color: #fff;
            border: 1px solid #4a1111;
            padding: 12px 25px;
            font-family: var(--font-b);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background .3s;
        }

        .browse-btn:hover {
            background: var(--red-h);
        }

        /* ── MAIN ── */
        main {
            padding: 30px 40px;
            flex-grow: 1;
        }

        /* ── CATEGORY NAV ── */
        .category-nav {
            display: flex;
            gap: 6px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .category-nav button {
            background: transparent;
            color: var(--text);
            border: 1px solid transparent;
            padding: 8px 18px;
            font-family: var(--font-b);
            font-weight: 700;
            font-size: .85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background .25s, color .25s, border-color .25s;
            border-radius: 2px;
        }

        .category-nav button:hover {
            background: rgba(255, 255, 255, .05);
            border-color: var(--border);
        }

        .category-nav button.active-category {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform .2s, box-shadow .2s, border-color .2s;
            animation: fadeIn .35s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .6);
            border-color: var(--border-h);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: #050505;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .product-card h3 {
            font-family: var(--font-h);
            font-size: 1.1rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-align: center;
        }

        .product-card .type {
            color: var(--red);
            font-size: .8rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .product-card .price {
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .donate-btn {
            width: 100%;
            background: var(--red);
            color: #fff;
            border: none;
            padding: 11px 0;
            font-family: var(--font-b);
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            font-size: .95rem;
            transition: background .25s, transform .15s;
            position: relative;
            overflow: hidden;
        }

        .donate-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background .15s;
        }

        .donate-btn:hover {
            background: var(--red-h);
        }

        .donate-btn:active::after {
            background: rgba(255, 255, 255, .1);
        }

        .donate-btn.added {
            background: #2a5e2a;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-dim);
            padding: 60px 0;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* ── CART SIDEBAR ── */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            z-index: 200;
            pointer-events: none;
            transition: background .35s;
        }

        .cart-overlay.open {
            background: rgba(0, 0, 0, .6);
            pointer-events: all;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 380px;
            max-width: 100vw;
            background: #0e0e0e;
            border-left: 2px solid var(--border);
            z-index: 201;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform .35s cubic-bezier(.4, 0, .2, 1);
        }

        .cart-sidebar.open {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .cart-header h2 {
            font-family: var(--font-h);
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .cart-close-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            width: 34px;
            height: 34px;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 2px;
            transition: border-color .2s, color .2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-close-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .cart-items::-webkit-scrollbar {
            width: 5px;
        }

        .cart-items::-webkit-scrollbar-track {
            background: transparent;
        }

        .cart-items::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .cart-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-dim);
            height: 100%;
            font-size: 1rem;
            letter-spacing: 1px;
            text-align: center;
        }

        .cart-empty span {
            font-size: 2.5rem;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 12px;
            animation: fadeIn .25s ease;
        }

        .cart-item img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            background: #050505;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .cart-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cart-item-name {
            font-family: var(--font-h);
            font-size: .95rem;
            letter-spacing: 1px;
            color: var(--gold);
        }

        .cart-item-price {
            color: var(--text-dim);
            font-size: .85rem;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .qty-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            transition: border-color .2s, color .2s;
            line-height: 1;
        }

        .qty-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .qty-display {
            min-width: 24px;
            text-align: center;
            font-weight: 700;
            font-size: .95rem;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: #6e3030;
            cursor: pointer;
            font-size: .75rem;
            letter-spacing: .5px;
            font-weight: 700;
            margin-left: auto;
            transition: color .2s;
            padding: 2px 4px;
            font-family: var(--font-b);
        }

        .remove-btn:hover {
            color: #c03030;
        }

        .cart-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total span:first-child {
            font-size: .9rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            font-weight: 700;
        }

        .cart-total-amount {
            font-family: var(--font-h);
            font-size: 1.5rem;
            color: var(--gold);
        }

        .checkout-btn {
            width: 100%;
            background: var(--red);
            color: #fff;
            border: 1px solid #4a1111;
            padding: 14px 0;
            font-family: var(--font-b);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background .25s;
        }

        .checkout-btn:hover {
            background: var(--red-h);
        }

        .checkout-btn:disabled {
            background: #333;
            border-color: #222;
            color: #666;
            cursor: not-allowed;
        }

        .cart-note {
            font-size: .78rem;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: .5px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            border: 1px solid var(--border-h);
            color: var(--gold);
            padding: 12px 24px;
            font-family: var(--font-b);
            font-weight: 700;
            font-size: .9rem;
            letter-spacing: 1px;
            border-radius: 2px;
            z-index: 300;
            transition: transform .3s cubic-bezier(.4, 0, .2, 1), opacity .3s;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ── FOOTER ── */
        footer {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 20px;
            background: #050505;
            border-top: 1px solid var(--border);
            font-size: .9rem;
            color: var(--text-dim);
        }

        .footer-feature {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .hero-content h2 {
                font-size: 3.5rem;
            }

            footer {
                gap: 20px;
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width: 600px) {
            .main-nav {
                display: none;
            }

            header {
                justify-content: center;
                flex-direction: column;
                gap: 15px;
            }

            .hero {
                padding: 0 20px;
                text-align: center;
            }

            main {
                padding: 20px;
            }

            .cart-sidebar {
                width: 100vw;
            }
        }
    </style>
</head>

<body>

    <!-- ── HEADER ── -->
    <header>
        <div class="logo">
            <h1>TIFLISI 1898</h1>
            <span>ROLEPLAY SERVER</span>
        </div>
        <nav class="main-nav">
            <a href="#" class="active">SHOP</a>
            <a href="https://forum.redmonline.com/">FORUM</a>
            <a href="https://discord.gg/jTQYqCwbMh">DISCORD</a>
        </nav>
        <button class="cart-btn" id="cartToggle">
            🛒 CART <span class="cart-count" id="cartCount">0</span>
        </button>
    </header>

    <!-- ── HERO ── -->
    <section class="hero">
        <div class="hero-content">
            <h2>SHOP</h2>
            <p>SUPPORT THE WEST. LEAVE YOUR LEGACY.</p>
            <button class="browse-btn"
                onclick="document.querySelector('main').scrollIntoView({behavior:'smooth'})">BROWSE ITEMS</button>
        </div>
    </section>

    <!-- ── MAIN ── -->
    <main>
        <nav class="category-nav" id="categoryNav"></nav>
        <section class="product-grid" id="productGrid"></section>
    </main>

    <!-- ── FOOTER ── -->
    <footer>
        <div class="footer-feature"><span>🚚</span> FAST DELIVERY</div>
        <div class="footer-feature"><span>🔒</span> SECURE PAYMENT</div>
        <div class="footer-feature"><span>👥</span> SUPPORT COMMUNITY</div>
    </footer>

    <!-- ── CART OVERLAY ── -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- ── CART SIDEBAR ── -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>YOUR CART</h2>
            <button class="cart-close-btn" id="cartClose">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>TOTAL</span>
                <span class="cart-total-amount" id="cartTotal">$0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" disabled>PROCEED TO CHECKOUT</button>
            <p class="cart-note">Payment handled externally after checkout.</p>
        </div>
    </div>

    <!-- ── TOAST ── -->
    <div class="toast" id="toast"></div>

    <script>
        /* ──────────────────────────────────────────
   DATA
────────────────────────────────────────── */
        const PRODUCTS = [{
                id: 1,
                name: 'HORSE',
                category: 'HORSE',
                price: 25,
                img: 'https://res.cloudinary.com/dlp1pnarv/image/upload/v1777806555/horse_uwhake.jpg',
                desc: 'White Arabian'
            },
            {
                id: 2,
                name: 'GUNSMITH',
                category: 'GUNSMITH',
                price: 30,
                img: 'https://res.cloudinary.com/dlp1pnarv/image/upload/v1777806555/gunsmith_vne1mg.jpg',
                desc: 'Custom Revolver'
            },
            {
                id: 3,
                name: 'BOAT',
                category: 'BOAT',
                price: 20,
                img: 'https://res.cloudinary.com/dlp1pnarv/image/upload/v1777806555/boat_cumveo.jpg',
                desc: 'Small Steamboat'
            },
            {
                id: 4,
                name: 'CART',
                category: 'CART',
                price: 20,
                img: 'https://res.cloudinary.com/dlp1pnarv/image/upload/v1777806555/cart_ubnnhb.jpg',
                desc: 'Chuck Wagon'
            },
            {
                id: 5,
                name: 'PET',
                category: 'PET',
                price: 35,
                img: 'https://res.cloudinary.com/dlp1pnarv/image/upload/v1777806556/dog_wtzau9.jpg',
                desc: 'Labrador Retriever'
            },
            {
                id: 6,
                name: 'RANCH',
                category: 'RANCH',
                price: 40,
                img: 'https://res.cloudinary.com/dlp1pnarv/image/upload/v1777806555/ranch_vo3xnq.jpg',
                desc: "Beecher's Hope"
            },
            {
                id: 7,
                name: 'MOONSHINE',
                category: 'MOONSHINE',
                price: 15,
                img: 'https://static.wikia.nocookie.net/reddeadredemption/images/4/4b/Moonshine_Shack_RDR2.png',
                desc: 'Moonshine Shack'
            },
            {
                id: 8,
                name: 'FREEZER',
                category: 'FREEZER',
                price: 18,
                img: 'https://static.wikia.nocookie.net/reddeadredemption/images/3/35/Icebox_RDR2.png',
                desc: 'Ice Storage'
            },
            {
                id: 9,
                name: 'LUMBERMAN',
                category: 'LUMBERMAN',
                price: 22,
                img: 'https://static.wikia.nocookie.net/reddeadredemption/images/5/5e/Axe_RDR2.png',
                desc: "Woodcutter's Kit"
            },
            {
                id: 10,
                name: 'CK',
                category: 'CK',
                price: 28,
                img: 'https://static.wikia.nocookie.net/reddeadredemption/images/2/2b/Camp_Kitchen_RDR2.png',
                desc: 'Camp Kitchen'
            },
            {
                id: 11,
                name: 'STORE',
                category: 'STORE',
                price: 50,
                img: 'https://static.wikia.nocookie.net/reddeadredemption/images/d/d8/General_Store_RDR2.png',
                desc: 'General Store License'
            },
        ];

        const CATEGORIES = ['ALL', ...new Set(PRODUCTS.map(p => p.category))];

        /* ──────────────────────────────────────────
           STATE
        ────────────────────────────────────────── */
        let activeCategory = 'ALL';
        let cart = []; // { id, name, price, img, qty }

        /* ──────────────────────────────────────────
           CART LOGIC
        ────────────────────────────────────────── */
        function addToCart(product) {
            const existing = cart.find(i => i.id === product.id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({
                    ...product,
                    qty: 1
                });
            }
            updateCartUI();
            showToast(`${product.name} added to cart`);
            bumpCount();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) removeFromCart(id);
            else updateCartUI();
        }

        function getTotal() {
            return cart.reduce((sum, i) => sum + i.price * i.qty, 0);
        }

        function getTotalItems() {
            return cart.reduce((sum, i) => sum + i.qty, 0);
        }

        /* ──────────────────────────────────────────
           UI RENDERING
        ────────────────────────────────────────── */
        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = CATEGORIES.map(cat => `
    <button class="${cat === activeCategory ? 'active-category' : ''}"
            onclick="setCategory('${cat}')">${cat}</button>
  `).join('');
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const filtered = activeCategory === 'ALL' ?
                PRODUCTS :
                PRODUCTS.filter(p => p.category === activeCategory);

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">NO ITEMS IN THIS CATEGORY YET.</div>`;
                return;
            }

            grid.innerHTML = filtered.map((p, i) => `
    <div class="product-card" style="animation-delay:${i * 0.05}s">
      <img src="${p.img}" alt="${p.name}" onerror="this.src='https://placehold.co/220x180/050505/554c38?text=Item'">
      <h3>${p.name}</h3>
      <span class="type">DONATE</span>
      <span class="price">$${p.price}</span>
      <button class="donate-btn" id="btn-${p.id}" onclick="handleDonate(${p.id})">DONATE</button>
    </div>
  `).join('');
        }

        function updateCartUI() {
            // Count badge
            const count = getTotalItems();
            const countEl = document.getElementById('cartCount');
            countEl.textContent = count;

            // Checkout btn
            document.getElementById('checkoutBtn').disabled = count === 0;

            // Total
            document.getElementById('cartTotal').textContent = `$${getTotal()}`;

            // Items list
            const itemsEl = document.getElementById('cartItems');
            if (cart.length === 0) {
                itemsEl.innerHTML = `
      <div class="cart-empty">
        <span>🤠</span>
        <p>YOUR CART IS EMPTY, STRANGER.</p>
      </div>`;
                return;
            }

            itemsEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img src="${item.img}" alt="${item.name}" onerror="this.src='https://placehold.co/64x64/050505/554c38?text=?'">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">$${item.price} each</div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          <span class="qty-display">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          <button class="remove-btn" onclick="removeFromCart(${item.id})">REMOVE</button>
        </div>
      </div>
    </div>
  `).join('');
        }

        /* ──────────────────────────────────────────
           ACTIONS
        ────────────────────────────────────────── */
        function setCategory(cat) {
            activeCategory = cat;
            renderCategories();
            renderProducts();
        }

        function handleDonate(id) {
            const product = PRODUCTS.find(p => p.id === id);
            if (!product) return;
            addToCart(product);

            // Brief "ADDED" flash on button
            const btn = document.getElementById(`btn-${id}`);
            if (btn) {
                btn.textContent = '✔ ADDED';
                btn.classList.add('added');
                setTimeout(() => {
                    btn.textContent = 'DONATE';
                    btn.classList.remove('added');
                }, 900);
            }
        }

        function openCart() {
            document.getElementById('cartSidebar').classList.add('open');
            document.getElementById('cartOverlay').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('open');
        }

        function bumpCount() {
            const el = document.getElementById('cartCount');
            el.classList.remove('bump');
            void el.offsetWidth; // reflow
            el.classList.add('bump');
            setTimeout(() => el.classList.remove('bump'), 200);
        }

        let toastTimer;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        /* ──────────────────────────────────────────
           CHECKOUT (hand-off point)
        ────────────────────────────────────────── */
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            // This is where you'd redirect to your payment / donation platform.
            // For now we show a confirmation alert with the cart summary.
            const lines = cart.map(i => `${i.name} x${i.qty} — $${i.price * i.qty}`).join('\n');
            alert(
                `ORDER SUMMARY\n\n${lines}\n\nTOTAL: $${getTotal()}\n\nYou will now be redirected to the payment page.`);
        });

        /* ──────────────────────────────────────────
           EVENT LISTENERS
        ────────────────────────────────────────── */
        document.getElementById('cartToggle').addEventListener('click', openCart);
        document.getElementById('cartClose').addEventListener('click', closeCart);
        document.getElementById('cartOverlay').addEventListener('click', closeCart);

        // ESC to close
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeCart();
        });

        /* ──────────────────────────────────────────
           INIT
        ────────────────────────────────────────── */
        renderCategories();
        renderProducts();
        updateCartUI();
    </script>
</body>

</html>
